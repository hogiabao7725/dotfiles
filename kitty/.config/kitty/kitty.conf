# -- Shell
shell fish

# -- Font
font_family      JetBrainsMono Nerd Font Mono
font_size        13

# -- Cursor
cursor_shape          beam
cursor_beam_thickness 1.0

# -- Window & Layout
window_padding_width  10
remember_window_size  no
initial_window_width  170c
initial_window_height 40c
enabled_layouts       splits,stack

# -- Opacity
# background_opacity         0.85
# dynamic_background_opacity yes

# -- Tab Bar
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "{index}: {title}"
tab_bar_min_tabs      1

# -- Window Border
window_border_width  1pt
draw_minimal_borders no

# -- Bell
enable_audio_bell    no
visual_bell_duration 0.0
window_alert_on_bell no
command_on_bell      none

# -- Keybindings: Tabs
map ctrl+shift+t      new_tab
map ctrl+shift+w      close_tab
map alt+e             next_tab
map alt+q             previous_tab
map alt+1             goto_tab 1
map alt+2             goto_tab 2
map alt+3             goto_tab 3
map alt+4             goto_tab 4
map alt+5             goto_tab 5
map alt+6             goto_tab 6
map alt+7             goto_tab 7
map alt+8             goto_tab 8
map alt+9             goto_tab 9

# -- Keybindings: Splits (Panes)
map ctrl+shift+left   launch --location=vsplit --cwd=current
map ctrl+shift+right  launch --location=vsplit --cwd=current
map ctrl+shift+up     launch --location=hsplit --cwd=current
map ctrl+shift+down   launch --location=hsplit --cwd=current
map ctrl+shift+q      close_window_with_confirmation
map ctrl+shift+z      toggle_layout stack

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
